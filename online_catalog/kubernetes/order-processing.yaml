apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processing
  namespace: online-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processing
  template:
    metadata:
      labels:
        app: order-processing
    spec:
      containers:
        - name: order-processing
          image: docker.io/ayaankhan17/order-processing:sha-bf273eb3102e9525054e982b124c7fb38fdc8dad
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8083"
---
apiVersion: v1
kind: Service
metadata:
  name: order-processing
  namespace: online-catalog
spec:
  selector:
    app: order-processing
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      nodePort: 30083
  type: NodePort
