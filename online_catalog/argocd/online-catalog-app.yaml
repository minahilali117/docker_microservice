apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/minahilali117/online_catalogue_microservice.git
    targetRevision: master
    path: online_catalog/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: online-catalog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
