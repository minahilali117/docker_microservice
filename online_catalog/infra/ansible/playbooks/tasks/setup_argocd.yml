---
- name: Ensure Argo CD namespace exists
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash

- name: Install Argo CD components
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
  args:
    executable: /bin/bash

- name: Wait for Argo CD CRDs to be established
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=180s
  args:
    executable: /bin/bash

- name: Wait for Argo CD server deployment
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s
  args:
    executable: /bin/bash

- name: Wait for Argo CD repo server deployment
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl wait --for=condition=Available deployment/argocd-repo-server -n argocd --timeout=300s
  args:
    executable: /bin/bash

- name: Expose Argo CD server through NodePort 30443
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl patch svc argocd-server -n argocd --type merge -p '{"spec":{"type":"NodePort","ports":[{"name":"https","port":443,"protocol":"TCP","targetPort":8080,"nodePort":30443}]}}'
  args:
    executable: /bin/bash

- name: Verify Argo CD Application manifest exists in repository
  ansible.builtin.stat:
    path: "{{ app_compose_dir }}/argocd/online-catalog-app.yaml"
  register: argocd_app_manifest

- name: Fail when Argo CD Application manifest is missing
  ansible.builtin.fail:
    msg: "Argo CD Application manifest was not found at {{ app_compose_dir }}/argocd/online-catalog-app.yaml"
  when: not argocd_app_manifest.stat.exists

- name: Apply Argo CD Application for online catalog
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl apply -f "{{ app_compose_dir }}/argocd/online-catalog-app.yaml"
  args:
    executable: /bin/bash

- name: Wait for Argo CD Application object
  become_user: ec2-user
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/home/ec2-user/.kube/config
    kubectl wait --for=jsonpath='{.status.sync.status}'=Synced application/online-catalog -n argocd --timeout=300s
  args:
    executable: /bin/bash
  changed_when: false

- name: Print Argo CD access details
  ansible.builtin.debug:
    msg:
      - "Argo CD URL: https://{{ ansible_host }}:30443"
      - "Username: admin"
      - "Get initial password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath=\"{.data.password}\" | base64 -d && echo"
      - "Check app status: kubectl get application -n argocd online-catalog"
